# Apex Forge — Agent Template Registry
# 115 templates across 12 categories
# Used by the orchestrator for capability-based task routing
version: "0.1.0"
categories:
  - code-operations
  - testing
  - architecture
  - devops-infrastructure
  - security
  - performance
  - documentation
  - design-frontend
  - data-backend
  - agent-orchestration
  - incident-response
  - project-management

templates:

  # ============================================================================
  # 1. CODE OPERATIONS (15 templates)
  # ============================================================================

  - id: code-review
    name: Code Review
    category: code-operations
    triggers: ["review this", "check my diff", "pre-landing review", "review PR", "look over my changes", "code review"]
    description: Review code changes for quality, correctness, style, and spec compliance.
    inputs: [git_diff, plan_file, style_guide, acceptance_criteria]
    outputs: [findings_report, severity_ratings, verdict, suggested_fixes]
    tools_needed: [git, grep, read, bash]
    model_hint: capable
    estimated_tokens: 5000

  - id: bug-fix
    name: Bug Fix
    category: code-operations
    triggers: ["fix this bug", "debug", "not working", "broken", "error", "crash", "exception", "failing"]
    description: Diagnose and fix a bug with root cause analysis and regression test.
    inputs: [error_description, stack_trace, reproduction_steps, affected_files]
    outputs: [root_cause, fix_diff, regression_test, verification_result]
    tools_needed: [git, bash, read, edit, grep]
    model_hint: capable
    estimated_tokens: 8000

  - id: feature-build
    name: Feature Build
    category: code-operations
    triggers: ["build this feature", "implement", "add support for", "new feature", "create a", "build me"]
    description: Implement a new feature from spec through tests to verification.
    inputs: [feature_spec, acceptance_criteria, file_list, architecture_context]
    outputs: [implementation_diff, tests, verification_result, documentation_update]
    tools_needed: [git, bash, read, edit, write]
    model_hint: capable
    estimated_tokens: 15000

  - id: refactor
    name: Refactor
    category: code-operations
    triggers: ["refactor", "restructure", "simplify this", "improve readability", "make this cleaner"]
    description: Restructure code for clarity, maintainability, or performance without changing behavior.
    inputs: [target_files, refactor_goal, constraints, test_suite_path]
    outputs: [refactored_diff, test_results, before_after_comparison]
    tools_needed: [git, bash, read, edit]
    model_hint: capable
    estimated_tokens: 10000

  - id: code-cleanup
    name: Code Cleanup
    category: code-operations
    triggers: ["clean up", "tidy", "lint fix", "format code", "style violations", "fix warnings"]
    description: Fix linting errors, formatting issues, and minor code hygiene problems.
    inputs: [target_files, lint_config, style_rules]
    outputs: [cleanup_diff, lint_report_before, lint_report_after]
    tools_needed: [bash, read, edit]
    model_hint: fast
    estimated_tokens: 3000

  - id: dependency-update
    name: Dependency Update
    category: code-operations
    triggers: ["update dependencies", "upgrade", "bump versions", "outdated packages", "npm update", "pip upgrade"]
    description: Update project dependencies with compatibility checks and test verification.
    inputs: [package_manifest, target_versions, breaking_change_notes]
    outputs: [updated_manifest, compatibility_report, test_results, migration_notes]
    tools_needed: [bash, read, edit]
    model_hint: balanced
    estimated_tokens: 5000

  - id: migration-write
    name: Migration Script Write
    category: code-operations
    triggers: ["write migration", "migration script", "upgrade path", "version migration", "breaking change migration"]
    description: Write automated migration scripts for schema, config, or API version changes.
    inputs: [source_version, target_version, change_manifest, rollback_requirements]
    outputs: [migration_script, rollback_script, validation_checks, execution_guide]
    tools_needed: [bash, read, write]
    model_hint: capable
    estimated_tokens: 8000

  - id: type-annotation
    name: Type Annotation
    category: code-operations
    triggers: ["add types", "type annotations", "typecheck", "fix type errors", "add typescript types", "type safety"]
    description: Add or fix type annotations to improve type safety and IDE support.
    inputs: [target_files, type_system, strictness_level, existing_type_definitions]
    outputs: [annotated_diff, type_coverage_report, type_error_fixes]
    tools_needed: [bash, read, edit, grep]
    model_hint: balanced
    estimated_tokens: 6000

  - id: dead-code-removal
    name: Dead Code Removal
    category: code-operations
    triggers: ["remove dead code", "unused code", "unreachable code", "find unused", "prune unused exports"]
    description: Identify and safely remove unreferenced code, unused imports, and dead branches.
    inputs: [target_directory, entry_points, test_suite_path]
    outputs: [dead_code_report, removal_diff, test_results, size_reduction_summary]
    tools_needed: [bash, read, edit, grep]
    model_hint: balanced
    estimated_tokens: 6000

  - id: extract-function
    name: Extract Function
    category: code-operations
    triggers: ["extract function", "extract method", "pull this out", "make this reusable", "extract into helper"]
    description: Extract inline logic into a named, testable, reusable function.
    inputs: [source_file, line_range, function_name, parameter_hints]
    outputs: [refactored_diff, new_function_signature, updated_call_sites, tests]
    tools_needed: [read, edit, bash]
    model_hint: balanced
    estimated_tokens: 4000

  - id: inline-function
    name: Inline Function
    category: code-operations
    triggers: ["inline this", "inline function", "remove indirection", "flatten this call", "unwrap function"]
    description: Inline a trivial or single-use function back into its call site.
    inputs: [source_file, function_name, call_sites]
    outputs: [inlined_diff, removed_function_list, test_results]
    tools_needed: [read, edit, grep, bash]
    model_hint: fast
    estimated_tokens: 3000

  - id: rename-symbol
    name: Rename Symbol
    category: code-operations
    triggers: ["rename this", "rename variable", "rename function", "rename class", "change name of"]
    description: Safely rename a symbol across all references in the codebase.
    inputs: [old_name, new_name, scope, file_pattern]
    outputs: [rename_diff, affected_files_list, test_results]
    tools_needed: [grep, read, edit, bash]
    model_hint: fast
    estimated_tokens: 3000

  - id: move-file
    name: Move File
    category: code-operations
    triggers: ["move this file", "relocate", "reorganize files", "move module", "change file path"]
    description: Move a file to a new location and update all imports and references.
    inputs: [source_path, destination_path, import_style]
    outputs: [move_diff, updated_imports_list, test_results]
    tools_needed: [bash, grep, read, edit]
    model_hint: balanced
    estimated_tokens: 4000

  - id: split-file
    name: Split File
    category: code-operations
    triggers: ["split this file", "file too large", "break up this module", "separate concerns", "decompose file"]
    description: Split a large file into smaller, cohesive modules with correct cross-references.
    inputs: [source_file, split_strategy, naming_convention]
    outputs: [new_files_list, updated_imports, index_file, test_results]
    tools_needed: [read, write, edit, bash, grep]
    model_hint: capable
    estimated_tokens: 8000

  - id: merge-files
    name: Merge Files
    category: code-operations
    triggers: ["merge these files", "combine files", "consolidate modules", "join files", "unify these"]
    description: Merge multiple related files into a single cohesive module.
    inputs: [source_files, target_file, conflict_resolution_strategy]
    outputs: [merged_file, updated_imports, removed_files_list, test_results]
    tools_needed: [read, write, edit, bash, grep]
    model_hint: balanced
    estimated_tokens: 6000

