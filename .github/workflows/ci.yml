name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bunx tsc --noEmit

      - name: Build binaries
        run: bun run build

      - name: Run unit tests
        run: bun test

      - name: Run CLI integration tests
        run: |
          ./dist/apex init
          ./dist/apex task create "CI Test" "Automated"
          ./dist/apex task list
          ./dist/apex memory add "CI fact" 0.9 ci
          ./dist/apex memory list
          ./dist/apex status
          ./dist/apex consensus test-all
